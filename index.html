<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="app-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Walk | Move within the News</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 900;
      }
      #overlay iframe {
        width: 80%;
        height: 80%;
        border: none;
        background: #fff;
      }
      #overlay button {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 10px;
        background-color: red;
        color: white;
        border: none;
      }
      #overlay button:hover {
        background-color: white;
        color: red;
        border: 1px solid red;
        cursor: pointer;
      }
      #joystick {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 100px;
        height: 100px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: none;
        touch-action: none;
        border: 2px dashed rgba(255, 255, 255, 0.3); /**Visual indicator */
        z-index: 100;
      }
      #stick {
        position: absolute;
        width: 40px;
        height: 40px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 50%;
        left: 30px;
        top: 30px;
      }
      .instructions {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 6px;
        position: absolute;
        top: 0;
        left: 2%;
        font-size: small;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
      }
      .mobile-info {
        display: none;
        padding: 6px;
        position: absolute;
        top: 0;
        left: 2%;
        font-size: smaller;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
      }
      .selector-div {
        position: absolute;
        top: 10%;
        right: 3%;
      }
      .selector-div > label {
        color: white;
      }
      @media (max-width: 600px) {
        #joystick {
          display: block;
        }
        .instructions {
          display: none;
        }
        .mobile-info {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div class="instructions">
      <span>Double-click to move around</span>
      <span>ESC key to be able to click the texts on the boxes</span>
      <span>WASD keys to move Forward, Left, Backward, Right</span>
    </div>
    <div class="mobile-info">
      <span>Tap the box text to read the story</span><br />
      <span>Move with the joystick</span>
    </div>
    <div class="selector-div">
      <label for="category">Choose a category:</label><br />
      <select name="sections" id="category">
        <option value="">--Please choose an option--</option>
        <option value="World">World</option>
        <option value="Technology">Technology</option>
        <option value="Business">Business</option>
        <option value="Sports">Sports</option>
        <option value="Entertainment">Entertainment</option>
      </select>
    </div>
    <div id="overlay">
      <button onclick="closeOverlay()">Close</button>
      <!-- <iframe id="storyFrame"></iframe> -->
      <frameset rows="100%,*" border="0">
        <frame id="storyFrame" src="" frameborder="0" />
      </frameset>
    </div>
    <div id="joystick"><div id="stick"></div></div>

    <script type="module">
      import * as THREE from "https://cdn.skypack.dev/three@0.132.2";
      import { PointerLockControls } from "https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/PointerLockControls.js";

      let scene = new THREE.Scene();
      scene.background = new THREE.Color(0x202020);

      let camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.set(0, 1.6, 20);

      let renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 1));

      let ground = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200),
        new THREE.MeshPhongMaterial({ color: 0x555555 }),
      );
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);

      // Controls
      let controls = new PointerLockControls(camera, document.body);
      document.body.addEventListener("dblclick", () => controls.lock()); // use double-click to lock
      scene.add(controls.getObject());

      // Movement
      let moveForward = false,
        moveBackward = false,
        moveLeft = false,
        moveRight = false;
      let velocity = new THREE.Vector3(),
        direction = new THREE.Vector3();
      document.addEventListener("keydown", (e) => {
        if (e.code === "KeyW") moveForward = true;
        if (e.code === "KeyS") moveBackward = true;
        if (e.code === "KeyA") moveLeft = true;
        if (e.code === "KeyD") moveRight = true;
      });
      document.addEventListener("keyup", (e) => {
        if (e.code === "KeyW") moveForward = false;
        if (e.code === "KeyS") moveBackward = false;
        if (e.code === "KeyA") moveLeft = false;
        if (e.code === "KeyD") moveRight = false;
      });

      // Raycaster
      let raycaster = new THREE.Raycaster();
      let mouse = new THREE.Vector2();
      document.addEventListener("click", (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        let intersects = raycaster.intersectObjects(scene.children, true);
        if (intersects.length > 0) {
          let mat = intersects[0].object.material;
          if (Array.isArray(mat)) {
            mat.forEach((m) => {
              // if (m.userData?.url) openOverlay(m.userData.url);
              if (m.userData?.url) openNewsLink(m.userData.url);
            });
          } else if (mat.userData?.url) {
            openOverlay(mat.userData.url);
          }
          // } else if (mat.userData?.link) {
          //   openOverlay(mat.userData.link);
          // }
        }
      });

      function openNewsLink(url) {
        // window.open(url, "_blank");
        window.open(url, "myWindow", "width=500,height=550");
      }

      function openOverlay(url) {
        document.getElementById("overlay").style.display = "flex";
        document.getElementById("storyFrame").src = url;
      }
      function closeOverlay() {
        document.getElementById("overlay").style.display = "none";
        document.getElementById("storyFrame").src = "";
      }
      window.closeOverlay = closeOverlay;

      // Fetch RSS
      // fetch("https://rss.app/feeds/v1.1/tFEkkPbun2w3lCoB.json")
      fetch("https://ok.surf/api/v1/cors/news-feed")
        .then((r) => r.json())
        .then((data) => {
          //let items = data.items;
          let selectValue;
          document
            .getElementById("category")
            .addEventListener("change", function () {
              selectValue = this.value;
              // console.log("Category ", data[selectValue]);
              alert(`[TODO]: Switch to ${selectValue} stories..`);
            });
          let items = data.World;
          // console.log("Items>>>> ", items);
          for (let i = 0; i < items.length; i += 4) {
            let group = items.slice(i, i + 4);
            let geometry = new THREE.BoxGeometry(2, 2, 2);
            let materials = [];
            for (let face = 0; face < 6; face++) {
              if (face !== 0 && face !== 1 && group[face - 2]) {
                // sides only
                let canvas = document.createElement("canvas");
                canvas.width = 256;
                canvas.height = 256;
                let ctx = canvas.getContext("2d");
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, 256, 256);
                ctx.fillStyle = "black";
                ctx.font = "20px Arial";
                wrapText(ctx, group[face - 2].title, 10, 40, 236, 24);
                let texture = new THREE.CanvasTexture(canvas);
                let mat = new THREE.MeshBasicMaterial({ map: texture });
                //mat.userData = { url: group[face - 2].url };
                mat.userData = { url: group[face - 2].link };
                materials.push(mat);
              } else {
                materials.push(
                  new THREE.MeshBasicMaterial({ color: 0x333333 }),
                );
              }
            }
            let cube = new THREE.Mesh(geometry, materials);
            cube.position.set((i / 4) * 5, 1, (i % 3) * 5);
            scene.add(cube);
          }
        });

      // function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      //   let words = text.split(" "),
      //     line = "";
      //   for (let n = 0; n < words.length; n++) {
      //     let testLine = line + words[n] + " ";
      //     let metrics = ctx.measureText(testLine);
      //     if (metrics.width > maxWidth && n > 0) {
      //       ctx.fillText(line, x, y);
      //       line = words[n] + " ";
      //       y += lineHeight;
      //     } else line = testLine;
      //   }
      //   ctx.fillText(line, x, y);
      // }
      // Helper: wrap text with underline
      function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
        let words = text.split(" ");
        let line = "";

        for (let n = 0; n < words.length; n++) {
          let testLine = line + words[n] + " ";
          let metrics = ctx.measureText(testLine);

          if (metrics.width > maxWidth && n > 0) {
            // draw the line of text
            ctx.fillText(line, x, y);

            // underline it
            let lineWidth = ctx.measureText(line).width;
            ctx.beginPath();
            ctx.moveTo(x, y + 2); // 2px below baseline
            ctx.lineTo(x + lineWidth, y + 2);
            ctx.strokeStyle = "black";
            ctx.lineWidth = 1;
            ctx.stroke();

            line = words[n] + " ";
            y += lineHeight;
          } else {
            line = testLine;
          }
        }

        // draw the last line
        ctx.fillText(line, x, y);
        let lineWidth = ctx.measureText(line).width;
        ctx.beginPath();
        ctx.moveTo(x, y + 2);
        ctx.lineTo(x + lineWidth, y + 2);
        ctx.strokeStyle = "black";
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // // Virtual Joystick
      // let joystick = document.getElementById("joystick");
      // let stick = document.getElementById("stick");
      // let joyActive = false,
      //   joyX = 0,
      //   joyY = 0;
      // if (window.innerWidth < 600) joystick.style.display = "block";
      // joystick.addEventListener("touchstart", (e) => {
      //   joyActive = true;
      // });
      // joystick.addEventListener("touchmove", (e) => {
      //   let rect = joystick.getBoundingClientRect();
      //   let touch = e.touches[0];
      //   joyX = (touch.clientX - rect.left - 50) / 50;
      //   joyY = (touch.clientY - rect.top - 50) / 50;
      //   stick.style.left = 30 + joyX * 20 + "px";
      //   stick.style.top = 30 + joyY * 20 + "px";
      // });
      // joystick.addEventListener("touchend", (e) => {
      //   joyActive = false;
      //   joyX = 0;
      //   joyY = 0;
      //   stick.style.left = "30px";
      //   stick.style.top = "30px";
      // });

      // Joystick variables
      let joystick = document.getElementById("joystick");
      let stick = document.getElementById("stick");
      let joyActive = false,
        joyX = 0,
        joyY = 0;
      const DEADZONE = 0.2; // threshold for ignoring small jitters

      if (window.innerWidth < 600) joystick.style.display = "block";

      joystick.addEventListener("touchstart", () => {
        joyActive = true;
      });
      joystick.addEventListener("touchmove", (e) => {
        let rect = joystick.getBoundingClientRect();
        let touch = e.touches[0];
        joyX = (touch.clientX - rect.left - 50) / 50; // -1 to +1
        joyY = (touch.clientY - rect.top - 50) / 50; // -1 to +1
        stick.style.left = 30 + joyX * 20 + "px";
        stick.style.top = 30 + joyY * 20 + "px";
      });
      joystick.addEventListener("touchend", () => {
        joyActive = false;
        joyX = 0;
        joyY = 0;
        stick.style.left = "30px";
        stick.style.top = "30px";
      });

      // Animate
      // Animate
      let clock = new THREE.Clock();
      function animate() {
        requestAnimationFrame(animate);
        let delta = clock.getDelta();

        // apply friction
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;

        // keyboard direction
        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);

        // override with joystick if active
        if (joyActive) {
          // direction.x = joyX;
          // direction.z = -joyY;
          // apply dead zone
          let jx = Math.abs(joyX) > DEADZONE ? joyX : 0;
          let jy = Math.abs(joyY) > DEADZONE ? joyY : 0;
          // vertical swipe → forward/back
          direction.z = -jy;
          // horizontal swipe → rotate camera yaw
          camera.rotation.y -= jx * 1.5 * delta;
          direction.x = 0; // disable strafing
        }

        direction.normalize();

        if (moveForward || moveBackward || joyActive)
          velocity.z -= direction.z * 50.0 * delta;
        if (moveLeft || moveRight) velocity.x -= direction.x * 50.0 * delta;

        controls.moveRight(-velocity.x * delta);
        controls.moveForward(-velocity.z * delta);

        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
